server.port=8099
server.servlet.context-path=/notifications-service
server.error.include-message=always

# Database Configuration - PostgreSQL
spring.datasource.url=jdbc:postgresql://postgres:5432/notifications_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.data.jpa.repositories.bootstrap-mode=default
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway Configuration
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration_active

# Kafka Configuration
spring.kafka.bootstrap-servers=kafka:29092
spring.kafka.consumer.group-id=notifications-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.listener.poll-timeout=3000
spring.kafka.listener.type=batch

# Logging Configuration
logging.level.root=INFO
logging.level.notifications.microservice=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/notifications-service.log

# Resilience4j Configuration
resilience4j.retry.configs.default.max-attempts=3
resilience4j.retry.configs.default.wait-duration=500ms

resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.slow-call-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.configs.default.slow-call-duration-threshold=2s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.emailService.base-config=default
resilience4j.circuitbreaker.instances.smsService.base-config=default

# Actuator Configuration - Expose metrics
management.endpoints.web.exposure.include=health,metrics,prometheus,info,env,circuitbreakers
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.metrics.enable.jvm=true
management.metrics.enable.process=true

# Application Info
spring.application.name=notifications-service
info.app.name=Notifications Service
info.app.description=Kafka-driven notification microservice for Banking Application
info.app.version=1.0.0

# Infobip SMS Configuration
infobip.api-key=${INFOBIP_API_KEY:}
infobip.base-url=8vr689.api.infobip.com
infobip.from-name=AppService

# MailHog (local load-test SMTP — unlimited, no auth)
mailhog.host=mailhog
mailhog.port=1025

# Mailtrap Email Configuration (SMTP)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAILTRAP_USERNAME:}
spring.mail.password=${MAILTRAP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

mail.from.email=afl.teslaru@gmail.com
mail.from.name=Notifications Service

# Twilio SMS Configuration (Legacy/Unused)
twilio.account-sid=
twilio.auth-token=
twilio.from-number=
